<!DOCTYPE html>
<html>
<head>
  <title>Time Tracker</title>
</head>
<body>
  <h1>Цаг бүртгэл</h1>

  <button onclick="checkIn()">Check In</button>
  <button onclick="checkOut()">Check Out</button>

  <p id="result"></p>

  <script>
    let checkInTime;

    function checkIn() {
      checkInTime = new Date();
      localStorage.setItem("checkIn", checkInTime);
      document.getElementById("result").innerText = "Орсон цаг: " + checkInTime;
    }

    function checkOut() {
      let out = new Date();
      let input = new Date(localStorage.getItem("checkIn"));
      let diff = (out - input) / (1000 * 60 * 60);

      document.getElementById("result").innerText =
        "Ажилласан: " + diff.toFixed(2) + " цаг";
    }
  </script>
</body>
</html>
