<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 40px;
    }

    .circle-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      font-size: 22px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .in {
      background: #22c55e;
    }

    .out {
      background: #ef4444;
    }

    .circle-btn:active {
      transform: scale(0.95);
    }

    #status {
      margin-top: 30px;
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1>⏱ Цаг бүртгэл</h1>

  <button id="btn" class="circle-btn in" onclick="toggle()">
    Check In
  </button>

  <div id="status"></div>

  <script>
    function getLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject("Geolocation not supported");
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        });
      },
      (err) => {
        reject(err);
      }
    );
  });
}
    if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
    let isCheckedIn = false;
let checkInTime;

// history хадгалах array
let history = JSON.parse(localStorage.getItem("history")) || [];

function toggle() {
  let btn = document.getElementById("btn");
  let status = document.getElementById("status");

  if (!isCheckedIn) {
    // CHECK IN
    checkInTime = new Date();

    localStorage.setItem("checkIn", checkInTime);

    btn.innerText = "Check Out";
    btn.classList.remove("in");
    btn.classList.add("out");

    status.innerText = "Орсон: " + checkInTime.toLocaleString();

    isCheckedIn = true;

  } else {
    // CHECK OUT
    let checkOutTime = new Date();
    let start = new Date(localStorage.getItem("checkIn"));

    let diff = (checkOutTime - start) / (1000 * 60 * 60);

    // 🟢 HISTORY-д хадгалах хэсэг
    let record = {
      date: start.toLocaleDateString(),
      checkIn: start.toLocaleTimeString(),
      checkOut: checkOutTime.toLocaleTimeString(),
      hours: diff.toFixed(2)
    };

    history.push(record);
    localStorage.setItem("history", JSON.stringify(history));

    btn.innerText = "Check In";
    btn.classList.remove("out");
    btn.classList.add("in");

    isCheckedIn = false;

    renderHistory();
  }
}

// 🟢 History харуулах функц
function renderHistory() {
  let status = document.getElementById("status");

  let html = "<h3>📅 History</h3>";

  history.slice().reverse().forEach(h => {
    html += `
      <div style="margin-bottom:10px;">
        📅 ${h.date}<br>
        ⏰ ${h.checkIn} → ${h.checkOut}<br>
        ⏱ ${h.hours} цаг
      </div>
      <hr>
    `;
  });

  status.innerHTML = html;
}

// page нээгдэхэд history ачаална
renderHistory();
  </script>

</body>
</html>
